---
- name: Install Docker and Semaphore UI
  hosts: semaphore
  become: true

  tasks:
    - name: Install dependencies
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - gnupg
          - docker.io
          - docker-compose
        state: present
        update_cache: yes

    - name: Start and enable Docker
      systemd:
        name: docker
        state: started
        enabled: true

    - name: Add akmadmin to docker group
      user:
        name: akmadmin
        groups: docker
        append: yes

    - name: Create Semaphore directory
      file:
        path: /opt/semaphore
        state: directory
        mode: '0755'

    - name: Deploy Docker Compose file
      copy:
        dest: /opt/semaphore/docker-compose.yml
        content: |
          services:
            mysql:
              image: mysql:8.0
              environment:
                MYSQL_ROOT_PASSWORD: semaphore
                MYSQL_DATABASE: semaphore
                MYSQL_USER: semaphore
                MYSQL_PASSWORD: semaphore
              volumes:
                - mysql_data:/var/lib/mysql

            semaphore:
              image: semaphoreui/semaphore:latest
              ports:
                - "3000:3000"
              environment:
                SEMAPHORE_DB_USER: semaphore
                SEMAPHORE_DB_PASS: semaphore
                SEMAPHORE_DB_HOST: mysql
                SEMAPHORE_DB_PORT: "3306"
                SEMAPHORE_DB_DIALECT: mysql
                SEMAPHORE_DB: semaphore
                SEMAPHORE_PLAYBOOK_PATH: /tmp/semaphore/
                SEMAPHORE_ADMIN_PASSWORD: akmlab
                SEMAPHORE_ADMIN_NAME: akmadmin
                SEMAPHORE_ADMIN_EMAIL: akmadmin@akmlab.local
                SEMAPHORE_ADMIN: akmadmin
                SEMAPHORE_ACCESS_KEY_ENCRYPTION: "wwUhAkAu5s4c+OH6YQwdQ+YbheXB3QXBXrlj5PdS9fI="
              depends_on:
                - mysql

          volumes:
            mysql_data:

    - name: Start Semaphore
      shell: docker-compose up -d
      args:
        chdir: /opt/semaphore
